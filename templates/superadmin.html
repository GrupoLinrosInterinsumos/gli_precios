<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GLI | Panel SuperAdmin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; font-family: 'Inter', sans-serif; }
        .card-custom { border: none; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .header-admin { background: #524e9c; color: white; padding: 2rem 0; margin-bottom: 2rem; }
    </style>
</head>
<body>

<div class="header-admin shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <h2 class="m-0 fw-bold"><i class="bi bi-shield-lock-fill me-2"></i>Gestión de Usuarios</h2>
        <a href="/admin" class="btn btn-light rounded-pill px-4 fw-bold">Volver al Panel</a>
    </div>
</div>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card card-custom p-4 mb-4">
                <h5 class="fw-bold mb-3">Crear Usuario Nuevo</h5>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Email</label>
                    <input type="email" id="newEmail" class="form-control" placeholder="ejemplo@gli.com">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Contraseña</label>
                    <input type="password" id="newPassword" class="form-control" placeholder="••••••••">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-bold">Rol del Sistema</label>
                    <select id="newRole" class="form-select">
                        <option value="Vendedor">Vendedor (Solo ventas)</option>
                        <option value="Admin">Admin (Costos y Excel)</option>
                        <option value="SuperAdmin">SuperAdmin (Todo)</option>
                    </select>
                </div>
                <button onclick="guardarUsuario()" class="btn btn-primary w-100 fw-bold rounded-pill">Registrar Usuario</button>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card card-custom p-4">
                <h5 class="fw-bold mb-3">Usuarios Activos</h5>
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Email</th>
                            <th>Rol</th>
                            <th class="text-end">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in usuarios %}
                        <tr>
                            <td class="fw-bold">{{ user.email }}</td>
                            <td><span class="badge {% if user.role == 'SuperAdmin' %}bg-danger{% elif user.role == 'Admin' %}bg-primary{% else %}bg-success{% endif %}">{{ user.role }}</span></td>
                            <td class="text-end">
                                <button onclick="eliminarUsuario({{ user.id }}, '{{ user.email }}')" class="btn btn-sm btn-outline-danger border-0"><i class="bi bi-trash3-fill"></i></button>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    async function guardarUsuario() {
        const email = document.getElementById('newEmail').value;
        const password = document.getElementById('newPassword').value;
        const role = document.getElementById('newRole').value;

        if(!email || !password) return alert("Completa todos los campos");

        const res = await fetch('/api/crear-usuario', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password, role})
        });

        if(res.ok) {
            location.reload();
        } else {
            const err = await res.json();
            alert("Error: " + err.error);
        }
    }

    async function eliminarUsuario(id, email) {
        if(!confirm(`¿Estás seguro de eliminar a ${email}?`)) return;

        const res = await fetch(`/api/eliminar-usuario/${id}`, { method: 'POST' });
        if(res.ok) {
            location.reload();
        } else {
            const err = await res.json();
            alert("Error: " + err.error);
        }
    }
</script>
</body>
</html>
