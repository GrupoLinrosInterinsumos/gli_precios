<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLI | Lista de Precios</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #3b3874; --bg-color: #ffffff; }
        body { background-color: var(--bg-color); font-family: 'Poppins', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card-login { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); padding: 3rem; width: 100%; max-width: 420px; }
        .company-logo { max-width: 160px; margin-bottom: 1.5rem; }
        .btn-brand { background-color: var(--primary-color); color: white; border: none; padding: 0.85rem; font-weight: 600; font-size: 0.95rem; border-radius: 8px; width: 100%; transition: 0.3s; margin-top: 0.5rem;}
        .btn-brand:hover { background-color: #2a2852; color: white; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 56, 116, 0.2); }
        .form-control { padding: 0.85rem; border-radius: 6px; border: 1px solid #d1d5db; background-color: #f9fafb; font-size: 0.9rem;}
        .form-control:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(59, 56, 116, 0.1); background-color: #ffffff;}
        .form-label { color: #4b5563; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px;}
        .alert-custom { background: #fee2e2; color: #991b1b; border: 1px solid #f87171; border-radius: 6px; padding: 12px; font-size: 0.85rem; font-weight: 600; text-align: center; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="card-login text-center">
        <img src="https://i.ibb.co/2G1PF5K/logo-gli.jpg" alt="Logo GLI" class="company-logo" onerror="this.style.display='none'">
        
        <p class="text-muted small mb-4" style="font-weight: 500;">Lista de Precios</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert-custom"><i class="bi bi-exclamation-circle me-1"></i>{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST" class="text-start">
            <div class="mb-3">
                <label class="form-label">Correo Corporativo</label>
                <input type="email" name="email" class="form-control" required placeholder="correo@gli.com">
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-brand shadow-sm">Ingresar al Sistema</button>
        </form>
    </div>
</body>
</html>
