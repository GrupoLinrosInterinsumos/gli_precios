<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLI | Lista de Precios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        :root { --primary-color: #3b3874; --bg-color: #ffffff; }
        body { background-color: var(--bg-color); font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card-login { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 2.5rem; width: 100%; max-width: 400px; }
        .company-logo { max-width: 150px; margin-bottom: 1rem; }
        .btn-brand { background-color: var(--primary-color); color: white; border: none; padding: 0.8rem; font-weight: 700; border-radius: 8px; width: 100%; transition: 0.2s; }
        .btn-brand:hover { background-color: #2a2852; color: white; }
        .form-control { padding: 0.75rem; border-radius: 6px; border: 1px solid #d1d5db; background-color: #f9fafb;}
        .form-control:focus { border-color: var(--primary-color); box-shadow: 0 0 0 3px rgba(59, 56, 116, 0.1); background-color: #ffffff;}
    </style>
</head>
<body>
    <div class="card-login text-center">
        <img src="https://i.ibb.co/2G1PF5K/logo-gli.jpg" alt="Logo GLI" class="company-logo" onerror="this.style.display='none'">
        
        <h4 class="fw-bold text-dark mb-1">GLI</h4>
        <p class="text-muted small mb-4">Lista de Precios</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="alert alert-danger py-2 small fw-bold">{{ messages[0] }}</div>
          {% endif %}
        {% endwith %}

        <form method="POST" class="text-start">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted text-uppercase">Correo Corporativo</label>
                <input type="email" name="email" class="form-control" required placeholder="correo@gli.com">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted text-uppercase">Contraseña</label>
                <input type="password" name="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-brand shadow-sm">Iniciar Sesión</button>
        </form>
    </div>
</body>
</html>
