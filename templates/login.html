<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GLI | Lista de Precios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1e1e2d; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card-login { background: #2b2b40; border-radius: 15px; padding: 3rem; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .logo { max-width: 150px; margin-bottom: 2rem; display: block; margin-left: auto; margin-right: auto; }
        .form-label { color: #a2a2c2; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; }
        .form-control { background: #1b1b28; border: 1px solid #323248; color: white; border-radius: 10px; padding: 0.8rem; }
        .form-control:focus { background: #1b1b28; border-color: #524e9c; color: white; box-shadow: none; }
        .btn-primary { background: #524e9c; border: none; padding: 0.8rem; font-weight: 700; border-radius: 10px; width: 100%; margin-top: 1rem; }
        .btn-primary:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="card-login">
        <img src="https://i.ibb.co/2G1PF5K/logo-gli.jpg" alt="GLI" class="logo">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Correo Corporativo</label>
                <input type="email" name="email" class="form-control" placeholder="usuario@gli.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary">INGRESAR</button>
        </form>
    </div>
</body>
</html>
