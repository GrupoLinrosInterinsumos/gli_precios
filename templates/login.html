<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLI - Lista de Precios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background: #f0f2f5; font-family: 'Inter', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { background: #fff; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); padding: 3.5rem 2.5rem; width: 100%; max-width: 420px; border: 1px solid rgba(0,0,0,0.05); }
        .brand-logo { max-width: 160px; margin-bottom: 1.5rem; }
        .btn-primary { background: #524e9c; border: none; padding: 0.85rem; border-radius: 12px; font-weight: 700; width: 100%; transition: 0.3s; font-size: 1rem; }
        .btn-primary:hover { background: #4338ca; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(82, 78, 156, 0.3); }
        .form-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #6b7280; font-weight: 700; margin-bottom: 8px; display: block; }
        .form-control { border-radius: 10px; padding: 0.8rem 1rem; border: 1px solid #e5e7eb; background: #f9fafb; font-size: 0.95rem; }
        .form-control:focus { box-shadow: 0 0 0 4px rgba(82, 78, 156, 0.1); border-color: #524e9c; background: #fff; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <img src="https://i.ibb.co/2G1PF5K/logo-gli.jpg" alt="Logo GLI" class="brand-logo" onerror="this.style.display='none'">
        
        <h4 class="fw-bold mb-1" style="color: #1f2937;">Portal Ejecutivo</h4>
        <p class="text-muted small mb-4">Gestión de Precios y Costos</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="alert alert-danger py-2 small fw-bold"><i class="bi bi-exclamation-circle me-1"></i>{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST" class="text-start">
            <div class="mb-3">
                <label class="form-label">Correo Corporativo</label>
                <input type="email" name="email" class="form-control" placeholder="usuario@gli.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Contraseña</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary shadow-sm">Ingresar al Sistema</button>
        </form>
    </div>
</body>
</html>
